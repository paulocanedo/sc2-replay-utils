[package]
name = "sc2-replay-utils"
version = "0.2.0"
edition = "2024"
default-run = "sc2-replay-gui"

[dependencies]
s2protocol = "3.5"
chrono = "0.4"
clap = { version = "4", features = ["derive", "env"] }
serde = { version = "1", features = ["derive"] }
serde_yml = "0.0"
dotenvy = "0.15"
dirs = "5"
image     = { version = "0.25", default-features = false, features = ["png"] }
imageproc = "0.25"
ab_glyph  = "0.2"
eframe    = { version = "0.29", default-features = false, features = ["default_fonts", "glow", "wayland", "x11"] }
egui      = "0.29"
egui_plot = "0.29"
rfd       = "0.15"
notify    = "6"

[[bin]]
name = "sc2-replay-gui"
path = "src/bin/gui.rs"