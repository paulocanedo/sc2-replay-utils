[package]
name = "sc2-replay-utils"
version = "0.2.0"
edition = "2024"

[dependencies]
s2protocol = "3.5"
serde = { version = "1", features = ["derive"] }
serde_yml = "0.0"
dotenvy = "0.15"
dirs = "5"
eframe    = { version = "0.29", default-features = false, features = ["default_fonts", "glow", "wayland", "x11"] }
egui      = "0.29"
egui_plot = "0.29"
rfd       = "0.15"
notify    = "6"

[[bin]]
name = "sc2-replay-gui"
path = "src/bin/gui.rs"
