name: Feature request
description: Suggest a new feature or enhancement for sc2-replay-utils.
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the problem first — that helps us evaluate alternatives, not just the proposed solution.

  - type: checkboxes
    id: prereqs
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true

  - type: dropdown
    id: scope
    attributes:
      label: Affected area
      description: Which part of the app would this touch?
      options:
        - build_order
        - timeline
        - charts
        - replay (parsing)
        - gui
        - library
        - map
        - balance (balance data)
        - army-value
        - supply-block
        - localization
        - new feature (no existing area)
        - other / not sure
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What's painful, missing, or confusing today? Describe the use case before the solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? Be as concrete as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you'd rule them out.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, screenshots, links to similar features in other tools, etc.
